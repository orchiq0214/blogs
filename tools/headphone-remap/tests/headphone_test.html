<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>耳机按键测试</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1115; color: #e6e9ef;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 16px;
    padding: 32px; max-width: 560px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 { font-size: 18px; color: #9ca3af; margin-bottom: 8px; font-weight: 500; }
  .progress { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .question { font-size: 22px; line-height: 1.5; margin-bottom: 28px; min-height: 60px; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .option {
    background: #232730; border: 2px solid transparent; border-radius: 10px;
    padding: 14px 18px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 12px; font-size: 16px;
  }
  .option:hover { background: #2a2f3a; }
  .option.selected {
    background: #1e40af; border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
  }
  .option .letter {
    width: 28px; height: 28px; border-radius: 6px;
    background: #2a2f3a; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px;
  }
  .option.selected .letter { background: #3b82f6; color: white; }
  .feedback {
    min-height: 36px; font-size: 18px; font-weight: 500;
    margin-bottom: 16px;
  }
  .correct { color: #10b981; }
  .wrong { color: #ef4444; }
  .hint {
    background: #0f1115; border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #9ca3af; line-height: 1.6;
  }
  .hint kbd {
    background: #2a2f3a; padding: 2px 8px; border-radius: 4px;
    font-family: ui-monospace, monospace; color: #e6e9ef;
    border-bottom: 2px solid #1a1d24;
  }
  .score {
    text-align: center; font-size: 48px; font-weight: 700;
    margin: 24px 0; color: #3b82f6;
  }
  .score-label { text-align: center; color: #9ca3af; margin-bottom: 24px; }
  .key-flash {
    position: fixed; top: 24px; right: 24px;
    background: #3b82f6; color: white; padding: 10px 18px;
    border-radius: 8px; font-weight: 600; font-size: 18px;
    opacity: 0; transition: opacity 0.1s;
    pointer-events: none;
  }
  .key-flash.show { opacity: 1; }
</style>
</head>
<body>
<div class="key-flash" id="keyflash"></div>
<div class="card">
  <h1>耳机按键测试</h1>
  <div class="progress" id="progress">第 1 / 5 题</div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div class="hint">
    按 <kbd>+（↑）</kbd> / <kbd>−（↓）</kbd> 切换选项 ·
    按 <kbd>中键（Enter）</kbd> 确认
  </div>
  <div id="result" style="display:none">
    <div class="score" id="score"></div>
    <div class="score-label">题答对</div>
  </div>
</div>

<script>
const QUIZ = [
  {
    q: "中国最高的山是哪一座？",
    options: ["泰山", "华山", "珠穆朗玛峰", "黄山"],
    answer: 2
  },
  {
    q: "1KB 等于多少字节（二进制约定）？",
    options: ["1000", "1024", "2048", "512"],
    answer: 1
  },
  {
    q: "下列哪个不是编程语言？",
    options: ["Python", "Java", "HTTP", "Rust"],
    answer: 2
  },
  {
    q: "光在真空中的速度约为多少？",
    options: ["3×10⁵ km/s", "3×10⁸ m/s", "3×10⁶ m/s", "3×10⁴ km/s"],
    answer: 1
  },
  {
    q: "下面哪个是 AutoHotkey v2 中匹配 Realtek 中键的正确写法？",
    options: ["Media_Play_Pause", "vkB3", "Media_Select", "Browser_Play"],
    answer: 1
  }
];

let cur = 0, selected = 0, answered = false, score = 0;
const $ = id => document.getElementById(id);

function render() {
  const q = QUIZ[cur];
  $("progress").textContent = `第 ${cur+1} / ${QUIZ.length} 题`;
  $("question").textContent = q.q;
  $("options").innerHTML = q.options.map((opt, i) =>
    `<div class="option ${i===selected?'selected':''}" data-i="${i}">
       <div class="letter">${"ABCD"[i]}</div>
       <div>${opt}</div>
     </div>`
  ).join("");
  $("feedback").textContent = "";
  $("feedback").className = "feedback";
  answered = false;

  document.querySelectorAll(".option").forEach(el => {
    el.onclick = () => {
      if (answered) return;
      selected = parseInt(el.dataset.i);
      render();
    };
  });
}

function showKey(label) {
  const f = $("keyflash");
  f.textContent = label;
  f.classList.add("show");
  clearTimeout(showKey._t);
  showKey._t = setTimeout(() => f.classList.remove("show"), 250);
}

function confirm() {
  if (answered) {
    // go to next
    cur++;
    if (cur >= QUIZ.length) {
      // show result
      $("question").style.display = "none";
      $("options").style.display = "none";
      $("feedback").style.display = "none";
      $("result").style.display = "block";
      $("score").textContent = `${score} / ${QUIZ.length}`;
      $("progress").textContent = "测试结束";
      return;
    }
    selected = 0;
    render();
    return;
  }
  const q = QUIZ[cur];
  answered = true;
  const correct = selected === q.answer;
  if (correct) score++;
  const fb = $("feedback");
  fb.textContent = correct ? "✓ 答对" : `✗ 答错，正确答案是 ${"ABCD"[q.answer]}`;
  fb.className = "feedback " + (correct ? "correct" : "wrong");
  // mark selected/correct
  document.querySelectorAll(".option").forEach((el, i) => {
    if (i === q.answer) el.classList.add("selected");
    else if (i === selected && !correct) el.style.opacity = "0.4";
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") { e.preventDefault(); showKey("↑"); if (!answered) { selected = (selected - 1 + QUIZ[cur].options.length) % QUIZ[cur].options.length; render(); } }
  else if (e.key === "ArrowDown") { e.preventDefault(); showKey("↓"); if (!answered) { selected = (selected + 1) % QUIZ[cur].options.length; render(); } }
  else if (e.key === "Enter") { e.preventDefault(); showKey("Enter"); confirm(); }
});

render();
</script>
</body>
</html>
